<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Claude</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100dvh; display: flex; flex-direction: column; }

  #auth { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 24px; }
  #auth h2 { font-size: 20px; opacity: 0.7; }
  #auth input { width: 100%; max-width: 320px; padding: 14px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #e8e8e8; font-size: 16px; outline: none; }
  #auth button { width: 100%; max-width: 320px; padding: 14px; background: #5865f2; border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }

  #chat { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  #status { padding: 10px 16px; font-size: 12px; opacity: 0.4; text-align: center; border-bottom: 1px solid #1a1a1a; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #5865f2; color: white; border-bottom-right-radius: 4px; }
  .msg.claude { align-self: flex-start; background: #1e1e1e; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; font-size: 12px; opacity: 0.4; background: none; padding: 4px 0; }

  .thinking { opacity: 0.5; font-style: italic; }
  .thinking::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  #input-row { display: flex; gap: 8px; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid #1a1a1a; }
  #input { flex: 1; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 24px; color: #e8e8e8; font-size: 16px; outline: none; resize: none; max-height: 120px; overflow-y: auto; }
  #send { width: 44px; height: 44px; background: #5865f2; border: none; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #send:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<div id="auth">
  <h2>Claude Bridge</h2>
  <input id="relay-url" type="text" placeholder="Railway URL (wss://...)" />
  <input id="secret" type="password" placeholder="Secret" />
  <button onclick="connect()">Connect</button>
</div>

<div id="chat">
  <div id="status">connecting...</div>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Message" rows="1"></textarea>
    <button id="send" onclick="send()">↑</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
let socket, waiting = false;

function connect() {
  const url = document.getElementById('relay-url').value.trim().replace(/\/$/, '');
  const secret = document.getElementById('secret').value.trim();
  if (!url || !secret) return;
  localStorage.setItem('relay-url', url);
  localStorage.setItem('secret', secret);
  _connect(url, secret);
}

function _connect(url, secret) {
  socket = io(url, { auth: { secret, role: 'browser' }, transports: ['websocket'] });
  socket.on('connect', () => {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';
    setStatus('connected');
  });
  socket.on('connect_error', (e) => { setStatus('error: ' + e.message); });
  socket.on('disconnect', () => setStatus('disconnected'));
  socket.on('reply', ({ text }) => {
    removeThinking();
    addMsg('claude', text);
    waiting = false;
    document.getElementById('send').disabled = false;
  });
}

function setStatus(s) { document.getElementById('status').textContent = s; }

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function removeThinking() {
  const t = document.querySelector('.thinking');
  if (t) t.remove();
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || waiting || !socket) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  const t = addMsg('claude', 'thinking');
  t.classList.add('thinking');
  socket.emit('message', { text });
  waiting = true;
  document.getElementById('send').disabled = true;
}

// Auto-fill saved values
window.onload = () => {
  const url = localStorage.getItem('relay-url');
  const secret = localStorage.getItem('secret');
  if (url) document.getElementById('relay-url').value = url;
  if (secret) document.getElementById('secret').value = secret;
};

// Enter to send (shift+enter = newline)
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('input');
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
