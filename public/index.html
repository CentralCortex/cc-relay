<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #070707;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --claude-a: #7c3aed; --claude-b: #5865f2;
  --codex-a:  #059669; --codex-b:  #10b981;
  --both-a:   #d97706; --both-b:   #f59e0b;
  --text: #f0f0f0;
  --dim: rgba(240,240,240,0.38);
  --xdim: rgba(240,240,240,0.16);
  --sb: env(safe-area-inset-bottom,0px);
  --st: env(safe-area-inset-top,0px);
}
html,body{ height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,sans-serif;overflow:hidden; }

/* Welcome */
#welcome{position:fixed;inset:0;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.wl{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.28);opacity:0;transform:translateY(8px);animation:fu .6s ease .3s forwards}
.wn{font-size:clamp(28px,8vw,46px);font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,#fff,rgba(255,255,255,.55));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transform:translateY(16px);animation:fu .8s cubic-bezier(.22,1,.36,1) .75s forwards}
#welcome.out{animation:fo .4s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
@keyframes fo{to{opacity:0;pointer-events:none}}

/* Auth */
#auth{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:12px;padding:40px 28px;padding-top:calc(40px + var(--st))}
#auth h2{font-size:20px;font-weight:600;margin-bottom:6px}
.ai{width:100%;max-width:340px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s}
.ai:focus{border-color:rgba(124,58,237,.5)}
.ab{width:100%;max-width:340px;padding:14px;background:linear-gradient(135deg,var(--claude-b),var(--claude-a));border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer}

/* Chat shell */
#chat{display:none;flex-direction:column;height:100dvh}

/* Header */
#hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;padding-top:calc(10px + var(--st));background:rgba(7,7,7,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;position:relative}
.hdl{display:flex;align-items:center;gap:10px}
#av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:linear-gradient(135deg,var(--claude-b),var(--claude-a));transition:background .3s}
.hi{display:flex;flex-direction:column}
#hn{font-size:14px;font-weight:600;line-height:1.2}
.sr{display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#3dd68c;animation:bk 2.4s ease infinite}
.dot.off{background:#555;animation:none}
#hs{font-size:11px;color:var(--dim)}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
#clr{font-size:11px;color:var(--xdim);padding:6px 8px;border-radius:8px;cursor:pointer}
#clr:active{background:var(--surface2);color:var(--dim)}

/* Mode bar */
#mb{display:flex;padding:9px 12px 5px;background:rgba(7,7,7,.9);backdrop-filter:blur(20px);flex-shrink:0;gap:7px}
.ms{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 0;border-radius:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:500;color:var(--dim);transition:all .18s;-webkit-touch-callout:none;user-select:none}
.ms:active{opacity:.7}
.msdot{width:6px;height:6px;border-radius:50%;opacity:.45;transition:opacity .2s}
.ms.active .msdot{opacity:1}
.ms[data-m="claude"].active{background:rgba(88,101,242,.16);border-color:rgba(88,101,242,.4);color:#a5b4fc}
.ms[data-m="claude"] .msdot{background:var(--claude-a)}
.ms[data-m="codex"].active{background:rgba(5,150,105,.16);border-color:rgba(5,150,105,.4);color:#6ee7b7}
.ms[data-m="codex"] .msdot{background:var(--codex-b)}
.ms[data-m="both"].active{background:rgba(217,119,6,.13);border-color:rgba(217,119,6,.4);color:#fcd34d}
.ms[data-m="both"] .msdot{background:linear-gradient(90deg,var(--claude-a),var(--codex-b))}

/* Active tasks pill */
#tasks-pill{display:none;position:absolute;top:50%;right:56px;transform:translateY(-50%);font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;background:rgba(217,119,6,.25);border:1px solid rgba(217,119,6,.4);color:#fcd34d;letter-spacing:.04em}

/* Messages */
#msgs{flex:1;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:10px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#msgs::-webkit-scrollbar{display:none}

.mrow{display:flex;align-items:flex-end;gap:7px}
.mrow.usr{flex-direction:row-reverse}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-bottom:2px}
.cav{background:linear-gradient(135deg,var(--claude-b),var(--claude-a))}
.xav{background:linear-gradient(135deg,var(--codex-a),var(--codex-b))}
.bav{background:linear-gradient(135deg,var(--claude-a),var(--both-a),var(--codex-b))}
.mrow.usr .mav{display:none}

.bub{max-width:80%;padding:10px 14px;border-radius:20px;line-height:1.55;font-size:15px;word-break:break-word;animation:pop .2s cubic-bezier(.34,1.56,.64,1);white-space:pre-wrap}
.bub.usr{background:linear-gradient(145deg,var(--claude-b),var(--claude-a));color:#fff;border-bottom-right-radius:5px}
.bub.cl{background:#181818;border:1px solid rgba(88,101,242,.18);border-bottom-left-radius:5px}
.bub.cx{background:#0f1e19;border:1px solid rgba(16,185,129,.2);border-bottom-left-radius:5px}
.bub.bt{background:#1a1610;border:1px solid rgba(217,119,6,.28);border-bottom-left-radius:5px}
.bub.sys{background:none;border:none;color:var(--xdim);font-size:11px;text-align:center;max-width:100%;padding:2px 0;animation:none}

/* Both-mode: stacked with source labels */
.bstack{display:flex;flex-direction:column;gap:7px;max-width:85%}
.slbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.slbl.c{color:#818cf8}.slbl.x{color:#34d399}.slbl.b{color:#fbbf24}

/* Draft chip — collapsed view of Claude's draft in both mode */
.draft-chip{font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:3px;-webkit-touch-callout:none;user-select:none}
.draft-chip:active{opacity:.7}
.draft-full{display:none;font-size:13px;color:var(--dim);white-space:pre-wrap;margin-bottom:6px;padding:8px 10px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}

/* Thinking */
.trow{display:flex;align-items:center;gap:7px}
.dots{display:flex;gap:4px;padding:10px 12px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:bn 1.2s ease infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}

/* In-flight label */
.task-label{font-size:10px;color:var(--dim);margin-left:4px;font-style:italic}

@keyframes bn{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.1);opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.88) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Input bar */
#ib{display:flex;align-items:flex-end;gap:7px;padding:7px 11px;padding-bottom:calc(7px + var(--sb));background:rgba(7,7,7,.93);backdrop-filter:blur(20px);border-top:1px solid var(--border);flex-shrink:0}
.bb{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .15s;-webkit-touch-callout:none;user-select:none;background:var(--surface2);color:var(--dim)}
.bb:active{transform:scale(.88)}
#mic.rec{background:#dc2626;color:#fff;animation:mr 1s ease infinite}
@keyframes mr{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.45)}50%{box-shadow:0 0 0 9px rgba(220,38,38,0)}}
#iw{flex:1}
#ipc{margin-bottom:3px}
#inp{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:16px;outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
#inp:focus{border-color:rgba(124,58,237,.35)}
#inp::placeholder{color:var(--xdim)}
#snd{width:40px;height:40px;border-radius:50%;border:none;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .15s;background:linear-gradient(135deg,var(--claude-b),var(--claude-a))}
#snd:active{transform:scale(.88)}

/* Rec overlay */
#ro{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);flex-direction:column;align-items:center;justify-content:center;gap:16px}
#ro.on{display:flex}
.rr{width:72px;height:72px;border-radius:50%;background:#dc2626;display:flex;align-items:center;justify-content:center;animation:rp 1s ease infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{box-shadow:0 0 0 18px rgba(220,38,38,0)}}
#rt{font-size:26px;font-weight:300;font-variant-numeric:tabular-nums}

/* Image preview */
.ipw{position:relative;display:inline-block}
.ipw img{max-height:100px;border-radius:10px;display:block}
.ipw .ri{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#333;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.bub img.mi{max-width:100%;border-radius:10px;display:block;margin-top:5px}
.vlbl{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,.7)}

/* ── Hype Man ── */
#hype{position:fixed;bottom:90px;right:-220px;z-index:200;display:flex;flex-direction:column;align-items:center;pointer-events:none;transition:right .05s}
#hype.in{right:12px}
#hype-img{width:150px;height:auto;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.7);transform-origin:center bottom}
#hype.in #hype-img{animation:hypin .6s cubic-bezier(.34,1.56,.64,1) forwards, hypspin 2.4s .6s ease-in-out 2, hypout .5s 5.5s ease-in forwards}
@keyframes hypin{from{opacity:0;transform:scale(.4) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes hypspin{0%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.08) rotate(18deg)}50%{transform:scale(1) rotate(-12deg)}75%{transform:scale(1.05) rotate(8deg)}100%{transform:scale(1) rotate(0deg)}}
@keyframes hypout{to{opacity:0;transform:scale(.3) rotate(200deg) translateY(40px)}}

#hype-bub{position:absolute;bottom:170px;right:0;background:#fff;color:#111;font-size:13px;font-weight:700;padding:10px 14px;border-radius:18px 18px 4px 18px;max-width:220px;text-align:center;line-height:1.35;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transform:scale(.6);transform-origin:bottom right}
#hype.in #hype-bub{animation:bubpop .35s .3s cubic-bezier(.34,1.56,.64,1) forwards, bubout .3s 5.3s ease-in forwards}
@keyframes bubpop{to{opacity:1;transform:scale(1)}}
@keyframes bubout{to{opacity:0;transform:scale(.5)}}
</style>
</head>
<body>

<div id="welcome"><div class="wl">Welcome</div><div class="wn">Chiggy Chase</div></div>

<div id="auth">
  <h2>AI Bridge</h2>
  <input id="url" class="ai" type="text" placeholder="Relay URL (wss://...)" autocomplete="off" autocorrect="off" spellcheck="false"/>
  <input id="sec" class="ai" type="password" placeholder="Secret"/>
  <button class="ab" onclick="connect()">Connect</button>
</div>

<div id="chat">
  <div id="hd">
    <div class="hdl">
      <div id="av">C</div>
      <div class="hi">
        <div id="hn">Claude</div>
        <div class="sr"><div class="dot off" id="dot"></div><span id="hs">disconnected</span></div>
      </div>
    </div>
    <div id="tasks-pill" id="tp"></div>
    <div id="clr" onclick="clearHist()">clear</div>
  </div>

  <div id="mb">
    <div class="ms active" data-m="claude" onclick="setMode('claude')"><div class="msdot"></div>Claude</div>
    <div class="ms" data-m="codex"  onclick="setMode('codex')"><div class="msdot"></div>Codex</div>
    <div class="ms" data-m="both"   onclick="setMode('both')"><div class="msdot"></div>Both</div>
  </div>

  <div id="msgs"></div>

  <div id="ib">
    <button class="bb" id="att" onclick="pickImg()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <div id="iw">
      <div id="ipc"></div>
      <textarea id="inp" placeholder="Message" rows="1"></textarea>
    </div>
    <button class="bb" id="mic">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button id="snd" onclick="send()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
</div>

<div id="ro">
  <div class="rr"><svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg></div>
  <div id="rt">0:00</div>
  <div style="font-size:12px;color:rgba(255,255,255,.3)">Lift to send · Swipe up to cancel</div>
</div>

<div id="hype">
  <div id="hype-bub"></div>
  <img id="hype-img" src="hype.png" alt=""/>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────
let socket;
let mode = localStorage.getItem('mode') || 'claude';
let pendingImg = null;
let mediaRecorder = null, audioChunks = [], recTmr = null, recStart = 0;

// Parallel task tracking: clientMsgId -> { thinkingEl, label, mode }
const inflight = new Map();

const HK = 'cc-v4';

// ── Welcome ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const url = localStorage.getItem('rurl');
  const sec = localStorage.getItem('rsec');
  if (url) document.getElementById('url').value = url;
  if (sec) document.getElementById('sec').value = sec;
  setMode(mode, false);
  initInput(); initMic();

  setTimeout(() => {
    document.getElementById('welcome').classList.add('out');
    setTimeout(() => {
      document.getElementById('welcome').style.display = 'none';
      if (url && sec) { document.getElementById('chat').style.display = 'flex'; _conn(url, sec); }
      else document.getElementById('auth').style.display = 'flex';
    }, 400);
  }, 2600);
});

// ── Mode ─────────────────────────────────────────────────────────
function setMode(m, save=true) {
  mode = m;
  if (save) localStorage.setItem('mode', m);
  document.querySelectorAll('.ms').forEach(el => el.classList.toggle('active', el.dataset.m === m));
  const av = document.getElementById('av');
  const hn = document.getElementById('hn');
  const sb = document.getElementById('snd');
  if (m === 'claude') { av.textContent='C'; av.style.background='linear-gradient(135deg,#5865f2,#7c3aed)'; hn.textContent='Claude'; sb.style.background='linear-gradient(135deg,#5865f2,#7c3aed)'; }
  if (m === 'codex')  { av.textContent='X'; av.style.background='linear-gradient(135deg,#059669,#10b981)'; hn.textContent='Codex';  sb.style.background='linear-gradient(135deg,#059669,#10b981)'; }
  if (m === 'both')   { av.textContent='∞'; av.style.background='linear-gradient(135deg,#7c3aed,#d97706,#10b981)'; hn.textContent='Claude + Codex'; sb.style.background='linear-gradient(135deg,#7c3aed,#10b981)'; }
}

// ── Connection ───────────────────────────────────────────────────
function connect() {
  const url = document.getElementById('url').value.trim().replace(/\/$/, '');
  const sec = document.getElementById('sec').value.trim();
  if (!url || !sec) return;
  localStorage.setItem('rurl', url); localStorage.setItem('rsec', sec);
  document.getElementById('auth').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  _conn(url, sec);
}

function _conn(url, sec) {
  setStat('connecting…', false);
  socket = io(url, { auth: { secret: sec, role: 'browser' }, transports: ['websocket'] });
  socket.on('connect', () => { setStat('online', true); loadHist(); });
  socket.on('connect_error', e => setStat('error: ' + e.message, false));
  socket.on('disconnect', () => setStat('disconnected', false));

  socket.on('reply', (data) => {
    const cid = data.clientMsgId;
    const entry = inflight.get(cid);
    if (entry) {
      entry.thinkingEl.remove();
      inflight.delete(cid);
      updateTaskPill();
      // hype on voice transcription too
      if (data.text && entry.isVoice) maybeHype(data.text);
    }

    if (data.brain === 'both' && data.claudeText) {
      renderBoth(data.claudeText, data.codexText);
      saveH({ role:'ai', m:'both', claude:data.claudeText, codex:data.codexText });
    } else {
      const who = data.brain === 'codex' ? 'codex' : 'claude';
      addBub(who, data.text);
      saveH({ role:'ai', m:who, text:data.text });
    }
  });
}

function setStat(s, on) {
  document.getElementById('hs').textContent = s;
  document.getElementById('dot').className = 'dot' + (on ? '' : ' off');
}

// ── Task pill ────────────────────────────────────────────────────
function updateTaskPill() {
  const pill = document.getElementById('tasks-pill');
  const n = inflight.size;
  if (n > 0) { pill.style.display='block'; pill.textContent = n + (n===1?' task':' tasks') + ' running'; }
  else pill.style.display = 'none';
}

// ── History ──────────────────────────────────────────────────────
function saveH(entry) {
  const h = JSON.parse(localStorage.getItem(HK) || '[]');
  h.push({ ...entry, ts: Date.now() });
  localStorage.setItem(HK, JSON.stringify(h));
}

function loadHist() {
  const h = JSON.parse(localStorage.getItem(HK) || '[]');
  h.forEach(e => {
    if (e.role === 'user') addUser(e.text, false, e.img);
    else if (e.m === 'both') renderBoth(e.claude, e.codex, false);
    else addBub(e.m === 'codex' ? 'codex' : 'claude', e.text, false);
  });
  if (h.length) { scrollBot(); addSys('— resumed —'); }
}

function clearHist() {
  localStorage.removeItem(HK);
  document.getElementById('msgs').innerHTML = '';
  addSys('— history cleared —');
}

// ── Rendering ────────────────────────────────────────────────────
function addUser(text, save=true, imgPrev) {
  const msgs = document.getElementById('msgs');
  const row = mk('div','mrow usr');
  const b = mk('div','bub usr');
  if (imgPrev) {
    const im = mk('img','mi'); im.src = imgPrev; b.appendChild(im);
    if (text) { const t=mk('div'); t.style.marginTop='5px'; t.textContent=text; b.appendChild(t); }
  } else if (text.startsWith('[voice]')) {
    b.innerHTML = `<div class="vlbl"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg>${esc(text.slice(8))}</div>`;
  } else { b.textContent = text; }
  row.appendChild(b); msgs.appendChild(row); scrollBot();
  if (save) saveH({ role:'user', text, img:imgPrev });
}

function addBub(who, text, anim=true) {
  const msgs = document.getElementById('msgs');
  const row = mk('div','mrow');
  const av = mk('div','mav ' + (who==='codex'?'xav':'cav'));
  av.textContent = who==='codex' ? 'X' : 'C';
  const b = mk('div','bub ' + (who==='codex'?'cx':'cl'));
  if (!anim) b.style.animation='none';
  b.textContent = text;
  row.appendChild(av); row.appendChild(b); msgs.appendChild(row); scrollBot();
}

function renderBoth(claudeText, codexText, anim=true) {
  const msgs = document.getElementById('msgs');

  // Claude's draft — collapsed by default, tap to expand
  const cRow = mk('div','mrow');
  const cAv  = mk('div','mav cav'); cAv.textContent='C';
  const cWrap= mk('div','bstack');
  const lbl  = mk('div','slbl c'); lbl.textContent='CLAUDE DRAFT';
  const chip = mk('div','draft-chip');
  chip.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg> show draft';
  const full = mk('div','draft-full'); full.textContent = claudeText;
  chip.onclick = () => {
    const open = full.style.display === 'block';
    full.style.display = open ? 'none' : 'block';
    chip.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="${open?'6 9 12 15 18 9':'6 15 12 9 18 15'}"/></svg> ${open?'show':'hide'} draft`;
  };
  cWrap.appendChild(lbl); cWrap.appendChild(chip); cWrap.appendChild(full);
  cRow.appendChild(cAv); cRow.appendChild(cWrap);

  // Codex's refined answer — expanded
  const xRow = mk('div','mrow');
  const xAv  = mk('div','mav xav bav'); xAv.textContent='∞';
  const xWrap= mk('div','bstack');
  const xLbl = mk('div','slbl b'); xLbl.textContent='BUILT TOGETHER';
  const xBub = mk('div','bub bt');
  if (!anim) xBub.style.animation='none';
  xBub.textContent = codexText;
  xWrap.appendChild(xLbl); xWrap.appendChild(xBub);
  xRow.appendChild(xAv); xRow.appendChild(xWrap);

  msgs.appendChild(cRow); msgs.appendChild(xRow); scrollBot();
}

function addThinkingFor(clientMsgId, label) {
  const msgs = document.getElementById('msgs');
  const row = mk('div','mrow trow'); row.id = 'th-'+clientMsgId;
  const av = mk('div','mav ' + (mode==='codex'?'xav':mode==='both'?'bav':'cav'));
  av.textContent = mode==='codex'?'X':mode==='both'?'∞':'C';
  const b = mk('div','bub '+(mode==='codex'?'cx':mode==='both'?'bt':'cl'));
  b.style.cssText='padding:0;border:none;background:none;display:flex;align-items:center';
  b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  if (label) { const l=mk('span','task-label'); l.textContent=label; b.appendChild(l); }
  row.appendChild(av); row.appendChild(b);
  msgs.appendChild(row); scrollBot();
  return row;
}

function addSys(t) {
  const msgs=document.getElementById('msgs');
  const row=mk('div','mrow'); const b=mk('div','bub sys'); b.textContent=t;
  row.appendChild(b); msgs.appendChild(row); scrollBot();
}

function scrollBot() { const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }
function mk(tag,cls){ const el=document.createElement(tag); if(cls) el.className=cls; return el; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Hype Man ─────────────────────────────────────────────────────

  "BITCH GET UP AND WERK 💅",
  "YASSSS QUEEN YOU GOT THIS PERIODT 👑",
  "STOP MOPING AND SLAY BESTIE ✨",
  "HUN NO — we DON'T spiral here 🌀",
  "BABY BREATHE AND EXECUTE 🔥",
  "YOU ARE THAT BITCH. ACT LIKE IT.",
  "THE UNIVERSE IS GAGGING ON YOUR TALENT 😩",
  "HONEY THE ONLY THING BROKEN IS YOUR ATTITUDE 💋",
  "WERK. THE. PROBLEM. OUT. PERIODT.",
  "STOP IT. You are BUILT for this. Period.",
  "OH HELL NO we are NOT giving up today 🚫",

  "THE GWORLS DON'T QUIT. BE THE GWORL. ✨",
  "I SAID WHAT I SAID — YOU'RE WINNING 🏆",
];

let _hypeTimer = null;
function triggerHype() {
  if (_hypeTimer) return;
  const el = document.getElementById('hype');
  const bub = document.getElementById('hype-bub');
  bub.textContent = HYPE_LINES[Math.floor(Math.random() * HYPE_LINES.length)];
  // force animation reset by removing class, flushing layout, re-adding
  el.classList.remove('in');
  void el.offsetWidth;
  el.classList.add('in');
  _hypeTimer = setTimeout(() => {
    el.classList.remove('in');
    _hypeTimer = null;
  }, 6200);
}

const NEG_PAT = /\b(fuck|shit|ugh+|wtf|wtaf|hate this|i give up|nothing works|why isn.t|why won.t|this is (broken|stupid|dumb|trash)|doesn.t work|can.?t figure|so confused|no idea|makes no sense|not working|im lost|i.?m stuck|forget it|why bother|this sucks|kill me|ffs|smh)\b|\?\?\?/i;

function maybeHype(text) {
  if (NEG_PAT.test(text) || (text.match(/\?/g)||[]).length >= 3 || text === text.toUpperCase() && text.length > 8 && /[A-Z]{4}/.test(text)) {
    setTimeout(triggerHype, 400);
  }
}

// ── Send ─────────────────────────────────────────────────────────
function send() {
  if (!socket) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text && !pendingImg) return;
  inp.value=''; inp.style.height='auto';
  document.getElementById('snd').style.opacity='1';

  const clientMsgId = Math.random().toString(36).slice(2);
  const payload = { text, brain: mode, clientMsgId };
  if (text) maybeHype(text);

  if (pendingImg) {
    payload.image = pendingImg.b64;
    payload.imageMimeType = pendingImg.mime;
    addUser(text, true, pendingImg.preview);
    clearImg();
  } else {
    addUser(text);
  }

  const shortLabel = text.length > 28 ? text.slice(0,28)+'…' : text;
  const thinkEl = addThinkingFor(clientMsgId, inflight.size > 0 ? shortLabel : null);
  inflight.set(clientMsgId, { thinkingEl: thinkEl, mode });
  updateTaskPill();
  socket.emit('message', payload);
}

// ── Input ────────────────────────────────────────────────────────
function initInput() {
  const inp = document.getElementById('inp');
  inp.addEventListener('input', () => {
    inp.style.height='auto';
    inp.style.height=Math.min(inp.scrollHeight,120)+'px';
  });
  inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
}

// ── Image ────────────────────────────────────────────────────────
function pickImg() {
  const i=document.createElement('input'); i.type='file'; i.accept='image/*';
  i.onchange=()=>{
    const f=i.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ pendingImg={b64:r.result.split(',')[1],mime:f.type,preview:r.result}; showImgPreview(r.result); };
    r.readAsDataURL(f);
  };
  i.click();
}
function showImgPreview(src) {
  document.getElementById('ipc').innerHTML=`<div class="ipw"><img src="${src}"/><button class="ri" onclick="clearImg()">✕</button></div>`;
}
function clearImg() { pendingImg=null; document.getElementById('ipc').innerHTML=''; }

// ── Mic ──────────────────────────────────────────────────────────
function initMic() {
  const btn=document.getElementById('mic');
  let cancel=false, startY=0;

  async function startR(y) {
    if (!socket) return;
    try {
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks=[];
      const mt=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
      mediaRecorder=new MediaRecorder(stream,{mimeType:mt});
      mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
      mediaRecorder.start(100);
      cancel=false; startY=y;
      btn.classList.add('rec');
      document.getElementById('ro').classList.add('on');
      recStart=Date.now();
      recTmr=setInterval(()=>{
        const s=Math.floor((Date.now()-recStart)/1000);
        document.getElementById('rt').textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      },500);
    } catch { alert('Mic permission needed'); }
  }

  function stopR(cancelled) {
    if(!mediaRecorder||mediaRecorder.state==='inactive') return;
    mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    clearInterval(recTmr);
    btn.classList.remove('rec');
    document.getElementById('ro').classList.remove('on');
    if(cancelled||Date.now()-recStart<500) return;
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:audioChunks[0]?.type||'audio/webm'});
      const r=new FileReader();
      r.onload=()=>{
        const b64=r.result.split(',')[1];
        const cid=Math.random().toString(36).slice(2);
        addUser('[voice] …transcribing…');
        const thinkEl=addThinkingFor(cid, inflight.size>0?'voice':null);
        inflight.set(cid,{thinkingEl:thinkEl,mode,isVoice:true});
        updateTaskPill();
        socket.emit('message',{text:'',audio:b64,audioMimeType:blob.type,brain:mode,clientMsgId:cid});
      };
      r.readAsDataURL(blob);
    };
  }

  btn.addEventListener('touchstart',e=>{e.preventDefault();startR(e.touches[0].clientY);},{passive:false});
  btn.addEventListener('touchmove',e=>{if(startY-e.touches[0].clientY>60)cancel=true;},{passive:true});
  btn.addEventListener('touchend',e=>{e.preventDefault();stopR(cancel);});
  btn.addEventListener('mousedown',e=>startR(e.clientY));
  window.addEventListener('mouseup',()=>{if(mediaRecorder?.state==='recording')stopR(false);});
}
