<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Claude</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --accent: #7c3aed;
  --accent2: #5865f2;
  --text: #f0f0f0;
  --text-dim: rgba(240,240,240,0.45);
  --text-xdim: rgba(240,240,240,0.2);
  --user-bg: linear-gradient(145deg, #5865f2, #7c3aed);
  --claude-bg: #181818;
  --radius-msg: 20px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html, body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif; overflow: hidden; }

/* ─── Welcome Screen ─── */
#welcome {
  position: fixed; inset: 0; background: #000; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
#welcome .label {
  font-size: 13px; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  opacity: 0; transform: translateY(8px);
  animation: fadeUp 0.7s ease 0.4s forwards;
}
#welcome .name {
  font-size: clamp(32px, 9vw, 48px); font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0; transform: translateY(16px);
  animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
}
#welcome.fade-out { animation: fadeOutScreen 0.5s ease forwards; }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOutScreen { to { opacity: 0; pointer-events: none; } }

/* ─── Auth Screen ─── */
#auth {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; gap: 14px; padding: 40px 28px;
  padding-top: calc(40px + var(--safe-top));
}
#auth h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.auth-input {
  width: 100%; max-width: 340px; padding: 15px 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus { border-color: rgba(124,58,237,0.5); }
.auth-btn {
  width: 100%; max-width: 340px; padding: 15px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none; border-radius: 14px; color: white;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.auth-btn:active { opacity: 0.85; transform: scale(0.99); }

/* ─── Chat Screen ─── */
#chat {
  display: none; flex-direction: column; height: 100dvh; position: relative;
}

/* Header */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; padding-top: calc(12px + var(--safe-top));
  background: rgba(8,8,8,0.85); backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border); position: relative; z-index: 10;
  flex-shrink: 0;
}
#header-left { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
#header-info { display: flex; flex-direction: column; }
#header-name { font-size: 15px; font-weight: 600; line-height: 1.2; }
#status-dot-row { display: flex; align-items: center; gap: 5px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #3dd68c;
  animation: pulse-dot 2s ease infinite;
}
.status-dot.offline { background: #666; animation: none; }
#status-text { font-size: 11px; color: var(--text-dim); }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
#clear-btn {
  font-size: 12px; color: var(--text-xdim); cursor: pointer; padding: 6px 10px;
  border-radius: 8px; transition: color 0.2s, background 0.2s;
}
#clear-btn:active { color: var(--text-dim); background: var(--surface2); }

/* Messages */
#messages {
  flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 10px;
  overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
}
#messages::-webkit-scrollbar { display: none; }

.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-bottom: 2px;
}
.msg-row.user .msg-avatar { display: none; }

.bubble {
  max-width: 78%; padding: 11px 15px; border-radius: var(--radius-msg);
  line-height: 1.55; font-size: 15px; word-break: break-word;
  animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.bubble.user {
  background: var(--user-bg); color: white;
  border-bottom-right-radius: 5px; align-self: flex-end;
}
.bubble.claude {
  background: var(--claude-bg); color: var(--text);
  border: 1px solid var(--border); border-bottom-left-radius: 5px;
  white-space: pre-wrap;
}
.bubble.system {
  background: none; border: none; color: var(--text-xdim);
  font-size: 11px; text-align: center; max-width: 100%; padding: 2px 0;
  animation: none;
}

/* Image in bubble */
.bubble img.msg-image {
  max-width: 100%; border-radius: 12px; display: block; margin-top: 6px;
}
.bubble .voice-label {
  display: flex; align-items: center; gap: 6px; font-size: 13px;
  color: rgba(255,255,255,0.75);
}
.voice-label svg { opacity: 0.75; }

@keyframes popIn { from { opacity: 0; transform: scale(0.88) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* Thinking indicator */
.thinking-row { display: flex; align-items: center; gap: 8px; }
.thinking-dots { display: flex; gap: 4px; padding: 12px 14px; }
.thinking-dots span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
  animation: bounce 1.2s ease infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.1);opacity:1} }

/* ─── Input Bar ─── */
#input-bar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 14px; padding-bottom: calc(10px + var(--safe-bottom));
  background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.bar-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: transform 0.15s, opacity 0.15s, background 0.2s;
  -webkit-touch-callout: none; user-select: none;
}
.bar-btn:active { transform: scale(0.9); }
#attach-btn { background: var(--surface2); color: var(--text-dim); }
#attach-btn:active { background: var(--surface); }
#mic-btn { background: var(--surface2); color: var(--text-dim); }
#mic-btn.recording { background: #dc2626; color: white; animation: mic-pulse 1s ease infinite; }
@keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)} 50%{box-shadow:0 0 0 10px rgba(220,38,38,0)} }

#input-wrap { flex: 1; position: relative; }
#input {
  width: 100%; padding: 11px 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); font-size: 16px; outline: none; resize: none;
  max-height: 120px; overflow-y: auto; line-height: 1.4;
  font-family: inherit; transition: border-color 0.2s;
}
#input:focus { border-color: rgba(124,58,237,0.4); }
#input::placeholder { color: var(--text-xdim); }

#send-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: white; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.15s;
}
#send-btn:disabled { opacity: 0.3; }
#send-btn:not(:disabled):active { transform: scale(0.9); }

/* Recording overlay */
#rec-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
#rec-overlay.active { display: flex; }
.rec-ring {
  width: 80px; height: 80px; border-radius: 50%;
  background: #dc2626; display: flex; align-items: center; justify-content: center;
  animation: ring-pulse 1s ease infinite;
}
@keyframes ring-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.5)} 50%{box-shadow:0 0 0 20px rgba(220,38,38,0)} }
.rec-label { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.8); }
.rec-hint { font-size: 13px; color: rgba(255,255,255,0.4); }
#rec-timer { font-size: 28px; font-weight: 300; font-variant-numeric: tabular-nums; }

/* Image preview */
.img-preview-wrap {
  position: relative; display: inline-block; margin-bottom: 4px;
}
.img-preview-wrap img { max-height: 120px; border-radius: 12px; display: block; }
.img-preview-wrap .remove-img {
  position: absolute; top: -6px; right: -6px; width: 22px; height: 22px;
  border-radius: 50%; background: #333; border: none; color: white;
  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* Scrollbar for desktop */
@media (min-width: 600px) {
  #messages::-webkit-scrollbar { display: block; width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .bubble { max-width: 65%; }
}
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome">
  <div class="label">Welcome</div>
  <div class="name">Chiggy Chase</div>
</div>

<!-- Auth Screen -->
<div id="auth">
  <h2>Claude Bridge</h2>
  <input id="relay-url" class="auth-input" type="text" placeholder="Relay URL (wss://...)" autocomplete="off" autocorrect="off" spellcheck="false" />
  <input id="secret" class="auth-input" type="password" placeholder="Secret" />
  <button class="auth-btn" onclick="connect()">Connect</button>
</div>

<!-- Chat Screen -->
<div id="chat">
  <div id="header">
    <div id="header-left">
      <div class="avatar">C</div>
      <div id="header-info">
        <div id="header-name">Claude</div>
        <div id="status-dot-row">
          <div class="status-dot offline" id="dot"></div>
          <span id="status-text">disconnected</span>
        </div>
      </div>
    </div>
    <div id="clear-btn" onclick="clearHistory()">clear</div>
  </div>

  <div id="messages"></div>

  <div id="input-bar">
    <button class="bar-btn" id="attach-btn" onclick="attachImage()" title="Attach image">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>

    <div id="input-wrap">
      <div id="img-preview-container"></div>
      <textarea id="input" placeholder="Message" rows="1"></textarea>
    </div>

    <button class="bar-btn" id="mic-btn" title="Hold to record">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- Recording Overlay -->
<div id="rec-overlay">
  <div class="rec-ring">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    </svg>
  </div>
  <div id="rec-timer">0:00</div>
  <div class="rec-label">Recording...</div>
  <div class="rec-hint">Lift to send · Swipe to cancel</div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
// ─── State ───────────────────────────────────────────────
let socket, waiting = false;
let pendingImage = null; // { b64, mime, preview }
let mediaRecorder = null, audioChunks = [], recTimer = null, recStart = 0;
const HISTORY_KEY = 'cc-history-v2';

// ─── Welcome animation ────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const url = localStorage.getItem('relay-url');
  const secret = localStorage.getItem('relay-secret');
  if (url) document.getElementById('relay-url').value = url;
  if (secret) document.getElementById('secret').value = secret;

  setTimeout(() => {
    const welcome = document.getElementById('welcome');
    welcome.classList.add('fade-out');
    setTimeout(() => {
      welcome.style.display = 'none';
      if (url && secret) {
        document.getElementById('chat').style.display = 'flex';
        _connect(url, secret);
      } else {
        document.getElementById('auth').style.display = 'flex';
      }
    }, 500);
  }, 2600);

  initInput();
  initMic();
});

// ─── Connection ───────────────────────────────────────────
function connect() {
  const url = document.getElementById('relay-url').value.trim().replace(/\/$/, '');
  const secret = document.getElementById('secret').value.trim();
  if (!url || !secret) return;
  localStorage.setItem('relay-url', url);
  localStorage.setItem('relay-secret', secret);
  document.getElementById('auth').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  _connect(url, secret);
}

function _connect(url, secret) {
  setStatus('connecting…', false);
  socket = io(url, { auth: { secret, role: 'browser' }, transports: ['websocket'] });

  socket.on('connect', () => {
    setStatus('online', true);
    loadHistory();
  });
  socket.on('connect_error', e => setStatus('error: ' + e.message, false));
  socket.on('disconnect', () => setStatus('disconnected', false));

  socket.on('reply', ({ text }) => {
    removeThinking();
    addMsg('claude', text);
    saveMsgHistory('claude', text);
    setWaiting(false);
  });
}

function setStatus(s, online) {
  document.getElementById('status-text').textContent = s;
  const dot = document.getElementById('dot');
  dot.className = 'status-dot' + (online ? '' : ' offline');
}

// ─── History ─────────────────────────────────────────────
function saveMsgHistory(role, text, imagePreview) {
  const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  h.push({ role, text, imagePreview, ts: Date.now() });
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

function loadHistory() {
  const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  h.forEach(({ role, text, imagePreview }) => addMsg(role, text, false, imagePreview));
  if (h.length) {
    scrollBottom();
    addMsg('system', '— resumed —', false);
  }
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  const msgs = document.getElementById('messages');
  while (msgs.firstChild) msgs.removeChild(msgs.firstChild);
  addMsg('system', '— history cleared —', false);
}

// ─── Messages ─────────────────────────────────────────────
function addMsg(role, text, save = true, imagePreview) {
  const msgs = document.getElementById('messages');

  if (role === 'system') {
    const el = document.createElement('div');
    el.className = 'msg-row';
    el.innerHTML = `<div class="bubble system">${text}</div>`;
    msgs.appendChild(el);
    scrollBottom();
    return el;
  }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'claude') {
    row.innerHTML = `<div class="msg-avatar">C</div><div class="bubble claude"></div>`;
    const bubble = row.querySelector('.bubble');
    bubble.textContent = text;
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble user';
    if (imagePreview) {
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = imagePreview;
      bubble.appendChild(img);
      if (text) {
        const t = document.createElement('div');
        t.style.marginTop = '6px';
        t.textContent = text;
        bubble.appendChild(t);
      }
    } else if (text.startsWith('[voice]')) {
      bubble.innerHTML = `<div class="voice-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg>
        ${escHtml(text.slice(8))}
      </div>`;
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);
  }

  msgs.appendChild(row);
  scrollBottom();
  return row;
}

function addThinking() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row thinking-row';
  row.id = 'thinking';
  row.innerHTML = `<div class="msg-avatar">C</div>
    <div class="bubble claude" style="padding:0;border:none;background:var(--claude-bg)">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(row);
  scrollBottom();
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Send text ────────────────────────────────────────────
function sendMessage() {
  if (waiting || !socket) return;
  const input = document.getElementById('input');
  const text = input.value.trim();

  if (!text && !pendingImage) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const payload = { text };

  if (pendingImage) {
    payload.image = pendingImage.b64;
    payload.imageMimeType = pendingImage.mime;
    addMsg('user', text, true, pendingImage.preview);
    saveMsgHistory('user', text, pendingImage.preview);
    clearImagePreview();
  } else {
    addMsg('user', text);
    saveMsgHistory('user', text);
  }

  addThinking();
  setWaiting(true);
  socket.emit('message', payload);
}

function setWaiting(v) {
  waiting = v;
  document.getElementById('send-btn').disabled = v || (!document.getElementById('input').value.trim() && !pendingImage);
}

// ─── Input auto-grow ──────────────────────────────────────
function initInput() {
  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    document.getElementById('send-btn').disabled = waiting || (!input.value.trim() && !pendingImage);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ─── Image attach ─────────────────────────────────────────
function attachImage() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataURL = reader.result;
      const b64 = dataURL.split(',')[1];
      pendingImage = { b64, mime: file.type, preview: dataURL };
      showImagePreview(dataURL);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function showImagePreview(dataURL) {
  const container = document.getElementById('img-preview-container');
  container.innerHTML = `
    <div class="img-preview-wrap">
      <img src="${dataURL}" />
      <button class="remove-img" onclick="clearImagePreview()">✕</button>
    </div>`;
  document.getElementById('send-btn').disabled = false;
}

function clearImagePreview() {
  pendingImage = null;
  document.getElementById('img-preview-container').innerHTML = '';
  const input = document.getElementById('input');
  document.getElementById('send-btn').disabled = waiting || !input.value.trim();
}

// ─── Voice recording ──────────────────────────────────────
function initMic() {
  const btn = document.getElementById('mic-btn');
  let cancelFlag = false;
  let touchStartY = 0;

  async function startRec(y) {
    if (waiting || !socket) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start(100);
      cancelFlag = false;
      touchStartY = y;
      btn.classList.add('recording');
      document.getElementById('rec-overlay').classList.add('active');
      recStart = Date.now();
      recTimer = setInterval(() => {
        const s = Math.floor((Date.now() - recStart) / 1000);
        document.getElementById('rec-timer').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      }, 500);
    } catch (e) {
      alert('Mic permission required');
    }
  }

  function stopRec(cancelled) {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(recTimer);
    btn.classList.remove('recording');
    document.getElementById('rec-overlay').classList.remove('active');

    if (cancelled || (Date.now() - recStart) < 500) return;

    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        const b64 = reader.result.split(',')[1];
        sendVoice(b64, blob.type);
      };
      reader.readAsDataURL(blob);
    };
  }

  // Touch events (mobile)
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    startRec(e.touches[0].clientY);
  }, { passive: false });

  btn.addEventListener('touchmove', e => {
    const dy = touchStartY - e.touches[0].clientY;
    if (dy > 60) cancelFlag = true;
  }, { passive: true });

  btn.addEventListener('touchend', e => {
    e.preventDefault();
    stopRec(cancelFlag);
  });

  // Mouse events (desktop)
  btn.addEventListener('mousedown', e => startRec(e.clientY));
  window.addEventListener('mouseup', () => { if (mediaRecorder?.state === 'recording') stopRec(false); });
}

function sendVoice(audioB64, mimeType) {
  if (!socket || waiting) return;
  addMsg('user', '[voice] …transcribing…');
  saveMsgHistory('user', '[voice] voice memo');
  addThinking();
  setWaiting(true);
  socket.emit('message', { text: '', audio: audioB64, audioMimeType: mimeType });
}
</script>
